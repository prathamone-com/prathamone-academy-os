server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Cache static assets (hashed filenames — safe to cache for 1 year)
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html so React Router handles them
    # This fixes /login, /dashboard, and any other client-side route returning 404 from nginx
    location / {
        try_files $uri $uri/ /index.html;
    }
}

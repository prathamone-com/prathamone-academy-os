# =============================================================================
# PRATHAMONE ACADEMY OS — GOOGLE CLOUD BUILD PIPELINE
# =============================================================================
steps:
  # 1. Database Migrations (Run in order as per project structure)
  - name: 'gcr.io/google-home-assistant/psql'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        for f in db/schema_layer0_layer3.sql db/schema_layer4_layer6.sql db/schema_layer7_layer9.sql db/schema_layer10.sql db/schema_layer11.sql db/rls_policies.sql db/module_01_admission_data.sql db/module_02_exams_data.sql; do
          psql "$$DATABASE_URL" -f $$f
        done
    secretEnv: ['DATABASE_URL']

  # 2. Build and Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$$PROJECT_ID/p1-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$$PROJECT_ID/p1-backend']

  # 3. Build and Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$$PROJECT_ID/p1-frontend', './frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$$PROJECT_ID/p1-frontend']

  # 4. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'p1-backend'
      - '--image'
      - 'gcr.io/$$PROJECT_ID/p1-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--add-cloudsql-instances'
      - '$$PROJECT_ID:us-central1:p1-db'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'

options:
  logging: CLOUD_LOGGING_ONLY
